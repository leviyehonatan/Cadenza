name: Windows build

# Builds Cadenza on Windows exactly as the README documents:
# clone JUCE into lib/JUCE, configure with CMake + Ninja, build, run ctest.
# FluidSynth is intentionally NOT installed here, so this also verifies the
# optional-FluidSynth path (the build falls back to NullSynthEngine).

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JUCE is not vendored in the repo (lib/ is gitignored). Pin to the same
      # version used for development so the build is reproducible.
      - name: Clone JUCE 8.0.13
        run: git clone --depth 1 --branch 8.0.13 https://github.com/juce-framework/JUCE.git lib/JUCE

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        run: cmake -S . -B build-msvc -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-msvc

      - name: Test
        run: ctest --test-dir build-msvc --output-on-failure
